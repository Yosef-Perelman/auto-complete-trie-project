<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autocomplete Trie</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="addWord">
        <input
          id="wordInput"
          type="text"
          placeholder="Enter a word to add to the dictionary"
        />
        <button id="addButton">Add Word</button>
        <div class="addedMessage"></div>
      </div>
      <input type="text" placeholder="Start typing to see suggestions..." />
      <div class="wordsNum"></div>
    </div>
    <script src="consoleInterface.js"></script>
  </body>
</html>
